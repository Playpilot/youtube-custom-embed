<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="color-scheme" content="light dark">

  <script src="https://unpkg.com/plyr@3"></script>
  <link rel="stylesheet" href="https://unpkg.com/plyr@3/dist/plyr.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #player,
    .plyr {
      --plyr-control-icon-size: 24px;
      --plyr-video-controls-background: linear-gradient(rgba(0, 0, 0, 0), black);
      --plyr-font-size-time: 16px;
      --plyr-font-family: 'Consolas', monospace;
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="player" data-plyr-provider="youtube" data-plyr-embed-id></div>

  <script>
    if (typeof Plyr !== 'undefined') {
      const element = document.querySelector('#player')
      const searchParams = new URL(document.location.href).searchParams

      element.dataset.plyrEmbedId = searchParams.get('video_id')
      element.style.setProperty('--plyr-color-main', '#' + (searchParams.get('color') || 'fa548a'))

      const player = new Plyr(element, {
        controls: (searchParams.get('controls') || '').split(','),
        playsinline: searchParams.get('playsinline') === 'true',
        autoplay: searchParams.get('autoplay') === 'true',
        muted: searchParams.get('muted') === 'true',
        youtube: {
          noCookie: true,
          cc_load_policy: searchParams.get('captions') === 'true' ? 1 : 0,
          cc_lang_pref: 'auto',
        },
      })

      player.on('ready', event => {
        player.volume = player.muted ? 0 : 1
      })

      if (searchParams.get('loop') === 'true') {
        player.on('statechange', event => {
          if (event.detail.code === 0) requestAnimationFrame(() => player.play())
        })
      }

      window.addEventListener('message', event => {
        if (event.data === 'mute') {
          player.volume = (player.muted || player.volume === 0) ? 1 : 0
        }
      })
    }
  </script>
</body>
